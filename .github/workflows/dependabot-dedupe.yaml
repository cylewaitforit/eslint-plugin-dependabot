name: Dependabot Dedupe

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dedupe:
    # Only run on Dependabot PRs with the 'needs dedupe' label
    if: >
      github.event.label.name == 'needs dedupe'
    name: Run pnpm dedupe
    runs-on: ubuntu-latest
    steps:
      - id: generate-token
        name: Generate GitHub App token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.DEDUPEBOT_ID }}
          private-key: ${{ secrets.DEDUPEBOT_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Checkout the PR branch with token that can push
          ref: ${{ github.head_ref }}
          token: ${{ steps.generate-token.outputs.token }}

      - uses: ./.github/actions/prepare

      - name: Run pnpm dedupe
        run: pnpm dedupe

      - id: git-check
        name: Check for changes
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - if: steps.git-check.outputs.changes == 'true'
        name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          git commit -m 'chore: run pnpm dedupe'
          git push

      - name: Remove label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'needs dedupe'
            });
